# Cloud Run service definition
# Deploy with:
#   gcloud run services replace cloudrun-service.yaml --region us-central1
#
# Or let the GitHub Actions workflow manage this automatically.
#
# IMPORTANT — before deploying, substitute the two placeholder values:
#   IMAGE:            your Artifact Registry image URI
#                     e.g. us-central1-docker.pkg.dev/PROJECT_ID/repo-people/backend:latest
#   CORS_ORIGINS:     comma-separated list of your frontend URL(s)
#                     e.g. https://repo-people.vercel.app
#   BACKEND_URL:      your public Cloud Run service URL (no trailing slash)
#                     e.g. https://repo-people-app-xxxxx-ew.a.run.app
#   FRONTEND_URL:     your Vercel app URL (no trailing slash)
#                     e.g. https://repo-people.vercel.app

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: repo-people-backend
  annotations:
    # Allow unauthenticated public access (the app has no built-in auth layer)
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        # Keep exactly one instance so the in-process SQLite store is consistent.
        # Scale-to-zero is still enabled (min=0) to avoid idle charges.
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "1"
        # Gen2 execution environment — better performance and full Linux syscalls
        run.googleapis.com/execution-environment: gen2
    spec:
      # Allow up to 3600 s per request — required for long-running SSE fetch jobs
      timeoutSeconds: 3600
      # Number of concurrent requests per container instance
      containerConcurrency: 80
      containers:
        - image: IMAGE  # substituted by CI/CD — see .github/workflows/deploy-cloud-run.yml
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: CORS_ORIGINS
              value: "CORS_ORIGINS"  # substituted by CI/CD from GH secret FRONTEND_URL
            - name: BACKEND_URL
              value: "BACKEND_URL"
            - name: FRONTEND_URL
              value: "FRONTEND_URL"
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          # Liveness probe — restart container if it stops responding
          livenessProbe:
            httpGet:
              path: /docs
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          # Startup probe — give uvicorn time to boot before traffic is sent
          startupProbe:
            httpGet:
              path: /docs
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
